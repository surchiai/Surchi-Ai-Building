    <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/surchiai/surchiai.github.io/refs/heads/main/SURCHI%20logo.jpg" />
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/surchiai/surchiai.github.io/refs/heads/main/SURCHI%20logo.jpg" />
    <script>
      (function() {
        try {
          var mode = localStorage.getItem('surchi_theme_mode') || 'dark';
          document.documentElement.classList.add(mode);
          if (mode === 'light') document.documentElement.classList.remove('dark');
          else document.documentElement.classList.remove('light');
        } catch (e) { console.error(e); }
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
